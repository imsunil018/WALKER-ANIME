<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Walker Admin — Management Console</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxanium:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
        <style>
        :root {
    --red: #ff1a3c;
    --dark: #070709;
    --dark2: #0e0e14;
    --dark3: #16161f;
    --border: rgba(255, 255, 255, 0.07);
    --text: #f0f0ff;
    --muted: rgba(240, 240, 255, 0.45);
}

body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 40px;
}

h1,
h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    color: var(--red);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.btn {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Oxanium', sans-serif;
    font-weight: 700;
    transition: 0.2s;
}

.btn-primary {
    background: var(--red);
    color: white;
}

.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 12px;
}

.stat-val {
    font-size: 32px;
    font-weight: 800;
    color: var(--red);
    margin-top: 5px;
}

.section-box {
    background: var(--dark2);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    text-align: left;
    padding: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    text-transform: uppercase;
}

td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: var(--muted);
    font-size: 12px;
}

input,
textarea,
select {
    width: 100%;
    padding: 10px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: white;
    outline: none;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(5px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: var(--dark2);
    padding: 30px;
    border-radius: 15px;
    width: 500px;
    max-height: 90vh;
    overflow-y: auto;
}

.id-badge {
    background: var(--dark3);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--red);
}

.hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
}

@media (max-width: 768px) {
    body { padding: 16px; }
    .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .section-box { padding: 18px; }
    .modal-content { width: min(520px, 92vw); padding: 20px; }
    table { display: block; overflow-x: auto; }
}
    </style>
    </head>
    <body>
        <div class="header">
            <div>
                <h1>Admin Panel</h1>
                <p style="color:var(--muted)">Manage your Walker Anime catalog
                    and sections</p>
            </div>
            <div style="display:flex; gap: 10px;">
                <a href="index.html" class="btn btn-outline"
                    style="text-decoration:none">View Site</a>
                <button class="btn btn-primary" onclick="openAddModal()">Add New
                    Title</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div>Total Visits</div><div class="stat-val"
                    id="statVisits">0</div></div>
            <div class="stat-card"><div>Unique Visitors</div><div
                    class="stat-val" id="statUnique">0</div></div>
            <div class="stat-card"><div>Video Plays</div><div class="stat-val"
                    id="statPlays">0</div></div>
            <div class="stat-card"><div>Top Title</div><div class="stat-val"
                    id="statTop" style="font-size:18px">...</div></div>
        </div>

        <div class="section-box">
            <h2>Section Management (Order by ID)</h2>
            <p
                style="font-size:12px; color:var(--muted); margin-bottom: 15px;">Comma
                separated IDs (e.g., 0, 1, 3)</p>
            <div
                style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <div class="input-group"><label>Hero Carousel</label><input
                        type="text" id="secHero"></div>
                <div class="input-group"><label>Trending Now</label><input
                        type="text" id="secTrending"></div>
                <div class="input-group"><label>New Releases</label><input
                        type="text" id="secNew"></div>
                <div class="input-group"><label>Top Picks</label><input
                        type="text" id="secPicks"></div>
                <div class="input-group"><label>Classics</label><input
                        type="text" id="secClassics"></div>
            </div>
            <button class="btn btn-primary" onclick="saveSections()">Update
                Sections</button>
        </div>

        <div class="section-box">
            <h2>Movie & Anime Database</h2>
            <div class="input-group" style="max-width:420px">
                <label>Search (ID / title / year / etc.)</label>
                <input type="text" id="itemsSearch" placeholder="Search..." oninput="refresh()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Season/Type</th>
                        <th>Rating</th>
                        <th>Views</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="itemsTable"></tbody>
            </table>
        </div>

        <!-- Form Modal -->
        <div class="modal" id="formModal">
            <div class="modal-content">
                <h2 id="modalLabel">Add New Title</h2>
                <form id="animeForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="editId">
                    <div class="input-group"><label>Title</label><input
                            type="text" id="fTitle" required></div>
                    <div class="input-group"><label>Season Name (e.g. Season
                            2)</label><input type="text" id="fSeason"
                            required></div>
                    <div class="input-group"><label>Description</label><textarea
                            id="fDesc" rows="3" required></textarea></div>
                    <div style="display:flex; gap:10px">
                        <div class="input-group"
                            style="flex:1"><label>Rating</label><input
                                type="text" id="fRating" value="9.0"></div>
                        <div class="input-group"
                            style="flex:1"><label>Year</label><input
                                type="number" id="fYear" value="2025"></div>
                    </div>
                    <div style="display:flex; gap:10px">
                        <div class="input-group"
                            style="flex:1"><label>Episodes</label><input
                                type="number" id="fEps" value="12"></div>
                        <div class="input-group"
                            style="flex:1"><label>Status</label><select
                                id="fStatus"><option>Ongoing</option><option>Completed</option></select></div>
                    </div>
                    <div class="input-group"><label>Genre</label><input
                            type="text" id="fGenre"
                            placeholder="Action / Fantasy"></div>
                    <div class="input-group"><label>Studio</label><input
                            type="text" id="fStudio"></div>
                    <div class="input-group"><label>Thumbnail (Upload)</label><input
                            type="file" id="fThumbFile" accept="image/*">
                        <div class="hint" id="thumbHint"></div></div>
                    <div class="input-group"><label>Thumbnail URL</label><input
                            type="url" id="fThumb"
                            placeholder="https://..."></div>
                    <div class="input-group"><label>Banner (Upload)</label><input
                            type="file" id="fBannerFile" accept="image/*">
                        <div class="hint" id="bannerHint"></div></div>
                    <div class="input-group"><label>Banner URL</label><input
                            type="url" id="fBanner"
                            placeholder="https://..."></div>
                    <div class="input-group"><label>Video (Upload)</label><input
                            type="file" id="fVideoFile" accept="video/*">
                        <div class="hint" id="videoHint"></div></div>
                    <div class="input-group"><label>Video URL
                            (.mp4 / stream)</label><input type="url" id="fVideo"
                            placeholder="https://..."></div>
                    <div style="display:flex; gap:10px; margin-top: 20px;">
                        <button type="button" class="btn btn-outline"
                            style="flex:1"
                            onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary"
                            style="flex:1">Save Title</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="data-layer.js"></script>
        <script>
        function refresh() {
            const data = WalkerData.getData();
            
            // Analytics
            document.getElementById('statVisits').textContent = data.analytics.totalVisits;
            document.getElementById('statUnique').textContent = data.analytics.uniqueVisitors;
            document.getElementById('statPlays').textContent = data.analytics.playEvents;
            const topItem = data.items.reduce((prev, curr) => (prev.viewCount > curr.viewCount) ? prev : curr, {title: 'N/A', viewCount: -1});
            document.getElementById('statTop').textContent = topItem.viewCount > 0 ? `${topItem.title} (${topItem.viewCount})` : 'No plays yet';

            // Sections
            document.getElementById('secHero').value = data.sections.hero.join(', ');
            document.getElementById('secTrending').value = data.sections.trending.join(', ');
            document.getElementById('secNew').value = data.sections.newReleases.join(', ');
            document.getElementById('secPicks').value = data.sections.topPicks.join(', ');
            document.getElementById('secClassics').value = data.sections.classics.join(', ');

            // Table
            const tbody = document.getElementById('itemsTable');
            const searchInput = document.getElementById('itemsSearch');
            const query = (searchInput ? searchInput.value : '').trim().toLowerCase();
            const tokens = query ? query.split(/\s+/).filter(Boolean) : [];
            const items = tokens.length
                ? data.items.filter((item) => {
                    const hay = [
                        item.id,
                        item.title,
                        item.season,
                        item.rating,
                        item.year,
                        item.genre,
                        item.studio,
                        item.status,
                        item.episodes,
                        (Array.isArray(item.tags) ? item.tags.join(' ') : item.tags)
                    ].map(v => (v === undefined || v === null) ? '' : String(v)).join(' ').toLowerCase();
                    return tokens.every(t => hay.includes(t));
                })
                : data.items;

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td><span class="id-badge">${item.id}</span></td>
                    <td style="font-weight:700">${item.title}</td>
                    <td>${item.season}</td>
                    <td style="color: #ffc947">★ ${item.rating}</td>
                    <td>${item.viewCount || 0}</td>
                    <td>
                        <button class="btn btn-outline" style="padding: 5px 10px; font-size:11px" onclick="editItem(${item.id})">Edit</button>
                        <button class="btn btn-outline" style="padding: 5px 10px; font-size:11px; color:var(--red)" onclick="deleteItem(${item.id})">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function saveSections() {
            const sections = {
                hero: document.getElementById('secHero').value.split(',').map(s => s.trim()).filter(s => s !== ''),
                trending: document.getElementById('secTrending').value.split(',').map(s => s.trim()).filter(s => s !== ''),
                newReleases: document.getElementById('secNew').value.split(',').map(s => s.trim()).filter(s => s !== ''),
                topPicks: document.getElementById('secPicks').value.split(',').map(s => s.trim()).filter(s => s !== ''),
                classics: document.getElementById('secClassics').value.split(',').map(s => s.trim()).filter(s => s !== '')
            };
            WalkerData.setSections(sections);
            alert('Sections updated successfully!');
            refresh();
        }

        function openAddModal() {
            document.getElementById('animeForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalLabel').textContent = "Add New Title";
            document.getElementById('thumbHint').textContent = '';
            document.getElementById('bannerHint').textContent = '';
            document.getElementById('videoHint').textContent = '';
            document.getElementById('formModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('formModal').style.display = 'none';
        }

        function editItem(id) {
            const item = WalkerData.getData().items.find(x => x.id === id);
            if (!item) return;

            document.getElementById('animeForm').reset();
            
            document.getElementById('editId').value = item.id;
            document.getElementById('fTitle').value = item.title;
            document.getElementById('fSeason').value = item.season;
            document.getElementById('fDesc').value = item.desc;
            document.getElementById('fRating').value = item.rating;
            document.getElementById('fYear').value = item.year;
            document.getElementById('fEps').value = item.episodes;
            document.getElementById('fStatus').value = item.status;
            document.getElementById('fGenre').value = item.genre;
            document.getElementById('fStudio').value = item.studio;

            const thumbIsStored = WalkerData.isMediaRef(item.thumb) || (typeof item.thumb === 'string' && item.thumb.startsWith('data:'));
            document.getElementById('fThumb').value = thumbIsStored ? '' : (item.thumb || '');
            document.getElementById('thumbHint').textContent = thumbIsStored ? 'Currently using uploaded thumbnail (saved in this browser).' : '';

            const bannerIsStored = WalkerData.isMediaRef(item.banner) || (typeof item.banner === 'string' && item.banner.startsWith('data:'));
            document.getElementById('fBanner').value = bannerIsStored ? '' : (item.banner || '');
            document.getElementById('bannerHint').textContent = bannerIsStored ? 'Currently using uploaded banner (saved in this browser).' : '';

            const videoIsStored = WalkerData.isMediaRef(item.video) || (typeof item.video === 'string' && item.video.startsWith('blob:'));
            document.getElementById('fVideo').value = videoIsStored ? '' : (item.video || '');
            document.getElementById('videoHint').textContent = videoIsStored ? 'Currently using uploaded video (saved in this browser).' : '';
            
            document.getElementById('modalLabel').textContent = "Edit Title: " + item.title;
            document.getElementById('formModal').style.display = 'flex';
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this title? It will be removed from all sections.')) {
                WalkerData.deleteItem(id);
                refresh();
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();

            const idRaw = document.getElementById('editId').value;
            const editing = idRaw !== '' && !Number.isNaN(parseInt(idRaw, 10));
            const editId = editing ? parseInt(idRaw, 10) : null;
            const existing = editing ? WalkerData.getData().items.find(x => x.id === editId) : null;

            const thumbUrl = document.getElementById('fThumb').value.trim();
            const bannerUrl = document.getElementById('fBanner').value.trim();
            const videoUrl = document.getElementById('fVideo').value.trim();
            const thumbFileInput = document.getElementById('fThumbFile');
            const videoFileInput = document.getElementById('fVideoFile');
            const bannerFileInput = document.getElementById('fBannerFile');
            const thumbFile = thumbFileInput && thumbFileInput.files ? (thumbFileInput.files[0] || null) : null;
            const videoFile = videoFileInput && videoFileInput.files ? (videoFileInput.files[0] || null) : null;
            const bannerFile = bannerFileInput && bannerFileInput.files ? (bannerFileInput.files[0] || null) : null;

            if (!editing && !thumbFile && !thumbUrl) {
                alert('Please provide a thumbnail URL or upload a thumbnail.');
                return;
            }
            if (!editing && !videoFile && !videoUrl) {
                alert('Please provide a video URL or upload a video.');
                return;
            }
            if (!editing && !bannerFile && !bannerUrl) {
                alert('Please provide a banner URL or upload a banner.');
                return;
            }

            const payload = {
                title: document.getElementById('fTitle').value,
                season: document.getElementById('fSeason').value,
                desc: document.getElementById('fDesc').value,
                rating: document.getElementById('fRating').value,
                year: parseInt(document.getElementById('fYear').value, 10),
                episodes: parseInt(document.getElementById('fEps').value, 10),
                status: document.getElementById('fStatus').value,
                genre: document.getElementById('fGenre').value,
                studio: document.getElementById('fStudio').value,
                thumb: thumbUrl || (existing ? existing.thumb : ''),
                banner: bannerUrl || (existing ? existing.banner : ''),
                video: videoUrl || (existing ? existing.video : ''),
                tags: document.getElementById('fGenre').value.split('/').map(t => t.trim()).filter(Boolean)
            };

            let finalId = editId;
            if (editing) {
                WalkerData.updateItem({ ...payload, id: editId });
            } else {
                const created = WalkerData.addItem(payload);
                finalId = created.id;
            }

            // If URL is provided on edit, and previous was an uploaded blob, remove it.
            if (editing && existing && thumbUrl && WalkerData.isMediaRef(existing.thumb)) {
                await WalkerData.deleteMediaBlob(existing.thumb).catch(() => {});
            }
            if (editing && existing && bannerUrl && WalkerData.isMediaRef(existing.banner)) {
                await WalkerData.deleteMediaBlob(existing.banner).catch(() => {});
            }
            if (editing && existing && videoUrl && WalkerData.isMediaRef(existing.video)) {
                await WalkerData.deleteMediaBlob(existing.video).catch(() => {});
            }

            // Uploaded thumbnail/video (stored in IndexedDB)
            if (thumbFile) {
                const ref = WalkerData.makeMediaRef('thumb', finalId);
                try {
                    await WalkerData.saveMediaBlob(ref, thumbFile);
                    WalkerData.updateItem({ id: finalId, thumb: ref });
                } catch {
                    if (!editing && !thumbUrl) {
                        WalkerData.deleteItem(finalId);
                        refresh();
                        alert('Thumbnail upload failed. Title not saved. Please use a URL instead.');
                        return;
                    }
                    alert('Thumbnail upload failed in this browser. Please use a URL instead.');
                }
            }
            if (bannerFile) {
                const ref = WalkerData.makeMediaRef('banner', finalId);
                try {
                    await WalkerData.saveMediaBlob(ref, bannerFile);
                    WalkerData.updateItem({ id: finalId, banner: ref });
                } catch {
                    if (!editing && !bannerUrl) {
                        WalkerData.deleteItem(finalId);
                        refresh();
                        alert('Banner upload failed. Title not saved. Please use a URL instead.');
                        return;
                    }
                    alert('Banner upload failed in this browser. Please use a URL instead.');
                }
            }
            if (videoFile) {
                const ref = WalkerData.makeMediaRef('video', finalId);
                try {
                    await WalkerData.saveMediaBlob(ref, videoFile);
                    WalkerData.updateItem({ id: finalId, video: ref });
                } catch {
                    if (!editing && !videoUrl) {
                        WalkerData.deleteItem(finalId);
                        refresh();
                        alert('Video upload failed. Title not saved. Please use a URL instead.');
                        return;
                    }
                    alert('Video upload failed in this browser. Please use a URL instead.');
                }
            }

            closeModal();
            refresh();
        }

        window.onload = refresh;
    </script>
    </body>
</html>
